name: billionmail
services:
  pgsql-billionmail:
    image: postgres:17.4-alpine
    hostname: pgsql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      POSTGRES_DB: ${DBNAME:?DBNAME is required}
      POSTGRES_USER: ${DBUSER:?DBUSER is required}
      POSTGRES_PASSWORD: ${DBPASS:?DBPASS is required}
    volumes:
      - type: bind
        source: ./postgresql-data
        target: /var/lib/postgresql/data
        is_directory: true
      - type: bind
        source: ./postgresql-socket
        target: /var/run/postgresql
        is_directory: true
    networks:
      default:
        aliases:
          - pgsql
  redis-billionmail:
    image: redis:7.4.2-alpine
    hostname: redis
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/redis-conf.sh"]
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
    sysctls:
      net.core.somaxconn: 4096
    volumes:
      - type: bind
        source: ./redis-data
        target: /data
        is_directory: true
      - ./conf/redis/redis-conf.sh:/redis-conf.sh
    networks:
      default:
        aliases:
          - redis
  rspamd-billionmail:
    image: billionmail/rspamd:1.2
    hostname: rspamd
    restart: unless-stopped
    depends_on:
      - redis-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    volumes:
      - ./conf/rspamd/local.d:/etc/rspamd/local.d
      - ./conf/rspamd/statistic.conf:/etc/rspamd/statistic.conf
      - ./conf/rspamd/rspamd.conf:/etc/rspamd/rspamd.conf
      - type: bind
        source: ./rspamd-data
        target: /var/lib/rspamd
        is_directory: true
      - type: bind
        source: ./logs/rspamd
        target: /var/log/rspamd
        is_directory: true
    networks:
      default:
        aliases:
          - rspamd
  dovecot-billionmail:
    image: billionmail/dovecot:1.6
    hostname: dovecot
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - redis-billionmail
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      DBNAME: ${DBNAME:?DBNAME is required}
      DBUSER: ${DBUSER:?DBUSER is required}
      DBPASS: ${DBPASS:?DBPASS is required}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      BILLIONMAIL_HOSTNAME: ${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    ports:
      - "${IMAP_PORT:-143}:143"
      - "${IMAPS_PORT:-993}:993"
      - "${POP_PORT:-110}:110"
      - "${POPS_PORT:-995}:995"
    volumes:
      - ./conf/dovecot/conf.d:/etc/dovecot/conf.d
      - ./conf/dovecot/dovecot.conf:/etc/dovecot/dovecot.conf
      - ./conf/dovecot/rsyslog.conf:/etc/rsyslog.conf
      - type: bind
        source: ./logs/dovecot
        target: /var/log/mail
        is_directory: true
      - type: bind
        source: ./ssl
        target: /etc/ssl/mail
        is_directory: true
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - type: bind
        source: ./vmail-data
        target: /var/vmail
        is_directory: true
      - type: bind
        source: ./rspamd-data
        target: /var/lib/rspamd
        is_directory: true
      - type: bind
        source: ./postgresql-socket
        target: /var/run/postgresql
        is_directory: true
    networks:
      default:
        aliases:
          - dovecot
  postfix-billionmail:
    image: billionmail/postfix:1.6
    hostname: postfix
    restart: unless-stopped
    depends_on:
      pgsql-billionmail:
        condition: service_started
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      DBNAME: ${DBNAME:?DBNAME is required}
      DBUSER: ${DBUSER:?DBUSER is required}
      DBPASS: ${DBPASS:?DBPASS is required}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      BILLIONMAIL_HOSTNAME: ${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${SMTPS_PORT:-465}:465"
      - "${SUBMISSION_PORT:-587}:587"
    volumes:
      - ./conf/postfix/main.cf:/etc/postfix/main.cf
      - ./conf/postfix/master.cf:/etc/postfix/master.cf
      - type: bind
        source: ./conf/postfix/conf
        target: /etc/postfix/conf
        is_directory: true
      - type: bind
        source: ./conf/postfix/sql
        target: /etc/postfix/sql
        is_directory: true
      - ./conf/postfix/rsyslog.conf:/etc/rsyslog.conf
      - type: bind
        source: ./logs/postfix
        target: /var/log/mail
        is_directory: true
      - type: bind
        source: ./ssl
        target: /etc/ssl/mail
        is_directory: true
      - type: bind
        source: ./postfix-data
        target: /var/spool/postfix
        is_directory: true
      - type: bind
        source: ./rspamd-data
        target: /var/lib/rspamd
        is_directory: true
      - type: bind
        source: ./postgresql-socket
        target: /var/run/postgresql
        is_directory: true
    networks:
      default:
        aliases:
          - postfix
  webmail-billionmail:
    image: roundcube/roundcubemail:1.6.11-fpm-alpine
    hostname: roundcube
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - dovecot-billionmail
      - postfix-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      ROUNDCUBEMAIL_DB_TYPE: pgsql
      ROUNDCUBEMAIL_DB_HOST: pgsql
      ROUNDCUBEMAIL_DB_NAME: ${DBNAME:?DBNAME is required}
      ROUNDCUBEMAIL_DB_USER: ${DBUSER:?DBUSER is required}
      ROUNDCUBEMAIL_DB_PASSWORD: ${DBPASS:?DBPASS is required}
      ROUNDCUBEMAIL_DEFAULT_HOST: dovecot
      ROUNDCUBEMAIL_DEFAULT_PORT: ${IMAP_PORT:-143}
      ROUNDCUBEMAIL_SMTP_SERVER: postfix
      ROUNDCUBEMAIL_SMTP_PORT: ${SMTP_PORT:-25}
      ROUNDCUBEMAIL_REQUEST_PATH: /roundcube
    volumes:
      - type: bind
        source: ./webmail-data
        target: /var/www/html
        is_directory: true
      - ./conf/webmail/mime.types:/var/roundcube/config/mime.types
      - ./conf/webmail:/var/roundcube/config
      - ./conf/php:/usr/local/etc
      - type: bind
        source: ./php-sock
        target: /var/run
        is_directory: true
    networks:
      default:
        aliases:
          - webmail
  core-billionmail:
    image: billionmail/core:4.9.1
    hostname: core-manage
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - redis-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      FAIL2BAN_INIT: ${FAIL2BAN_INIT:-y}
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
      - NET_RAW
    expose:
      - "80"
      - "443"
    volumes:
      - type: bind
        source: ./ssl
        target: /etc/ssl/mail
        is_directory: true
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - type: bind
        source: ./conf/core/fail2ban/filter.d
        target: /etc/fail2ban/filter.d
        is_directory: true
      - type: bind
        source: ./conf/core/fail2ban/jail.d
        target: /etc/fail2ban/jail.d
        is_directory: true
      - type: bind
        source: ./logs/fail2ban
        target: /var/log/fail2ban
        is_directory: true
      - type: bind
        source: ./postgresql-socket
        target: /opt/billionmail/postgresql-socket
        is_directory: true
      - type: bind
        source: ./php-sock
        target: /opt/billionmail/php-sock
        is_directory: true
      - type: bind
        source: ./rspamd-data
        target: /opt/billionmail/rspamd-data
        is_directory: true
      - type: bind
        source: ./webmail-data
        target: /opt/billionmail/webmail-data
        is_directory: true
      - type: bind
        source: ./.env
        target: /opt/billionmail/.env
        content: |
          ADMIN_USERNAME=${ADMIN_USERNAME:?ADMIN_USERNAME is required}
          ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
          SafePath=${SafePath:?SafePath is required}
          BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
          DBNAME=${DBNAME:?DBNAME is required}
          DBUSER=${DBUSER:?DBUSER is required}
          DBPASS=${DBPASS:?DBPASS is required}
          REDISPASS=${REDISPASS:?REDISPASS is required}
          SMTP_PORT=${SMTP_PORT:-25}
          SMTPS_PORT=${SMTPS_PORT:-465}
          SUBMISSION_PORT=${SUBMISSION_PORT:-587}
          IMAP_PORT=${IMAP_PORT:-143}
          IMAPS_PORT=${IMAPS_PORT:-993}
          POP_PORT=${POP_PORT:-110}
          POPS_PORT=${POPS_PORT:-995}
          REDIS_PORT=127.0.0.1:26379
          SQL_PORT=127.0.0.1:25432
          HTTP_PORT=${HTTP_PORT:-80}
          HTTPS_PORT=${HTTPS_PORT:-443}
          TZ=${TZ:-America/Santo_Domingo}
          IPV4_NETWORK=${IPV4_NETWORK:-172.66.1}
          FAIL2BAN_INIT=${FAIL2BAN_INIT:-y}
          IP_WHITELIST_ENABLE=${IP_WHITELIST_ENABLE:-false}
          RETENTION_DAYS=${RETENTION_DAYS:-7}
      - ./conf:/opt/billionmail/conf
      - type: bind
        source: ./logs
        target: /opt/billionmail/logs
        is_directory: true
      - type: bind
        source: ./logs/core
        target: /opt/billionmail/core/logs
        is_directory: true
      - type: bind
        source: ./core-data
        target: /opt/billionmail/core/data
        is_directory: true
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - type: bind
        source: ./vmail-data
        target: /opt/billionmail/vmail-data
        is_directory: true
    networks:
      default:
        aliases:
          - core