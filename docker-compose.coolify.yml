name: billionmail
services:
  pgsql-billionmail:
    image: postgres:17.4-alpine
    hostname: pgsql
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      POSTGRES_DB: ${DBNAME:?DBNAME is required}
      POSTGRES_USER: ${DBUSER:?DBUSER is required}
      POSTGRES_PASSWORD: ${DBPASS:?DBPASS is required}
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
      - ./postgresql-socket:/var/run/postgresql
    networks:
      default:
        aliases:
          - pgsql
  redis-billionmail:
    image: redis:7.4.2-alpine
    hostname: redis
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf 'requirepass %s\n' "$$REDISPASS" > /redis.conf
        exec redis-server /redis.conf
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
    sysctls:
      net.core.somaxconn: 4096
    volumes:
      - ./redis-data:/data
    networks:
      default:
        aliases:
          - redis
  rspamd-billionmail:
    image: billionmail/rspamd:1.2
    hostname: rspamd
    restart: unless-stopped
    depends_on:
      - redis-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    entrypoint:
      - /bin/bash
      - -c
      - |
        ln -sf /opt/billionmail/conf/rspamd/rspamd.conf /etc/rspamd/rspamd.conf
        ln -sf /opt/billionmail/conf/rspamd/statistic.conf /etc/rspamd/statistic.conf
        rm -rf /etc/rspamd/local.d
        ln -s /opt/billionmail/conf/rspamd/local.d /etc/rspamd/local.d
        exec /rspamd.sh "$$@"
      - --
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    volumes:
      - ./conf/rspamd:/opt/billionmail/conf/rspamd
      - ./rspamd-data:/var/lib/rspamd
      - ./logs/rspamd:/var/log/rspamd
    networks:
      default:
        aliases:
          - rspamd
  dovecot-billionmail:
    image: billionmail/dovecot:1.6
    hostname: dovecot
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - redis-billionmail
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      DBNAME: ${DBNAME:?DBNAME is required}
      DBUSER: ${DBUSER:?DBUSER is required}
      DBPASS: ${DBPASS:?DBPASS is required}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      BILLIONMAIL_HOSTNAME: ${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    entrypoint:
      - /bin/bash
      - -c
      - |
        ln -sf /opt/billionmail/conf/dovecot/dovecot.conf /etc/dovecot/dovecot.conf
        ln -sf /opt/billionmail/conf/dovecot/rsyslog.conf /etc/rsyslog.conf
        rm -rf /etc/dovecot/conf.d
        ln -s /opt/billionmail/conf/dovecot/conf.d /etc/dovecot/conf.d
        exec /dovecot.sh "$$@"
      - --
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    ports:
      - "${IMAP_PORT:-143}:143"
      - "${IMAPS_PORT:-993}:993"
      - "${POP_PORT:-110}:110"
      - "${POPS_PORT:-995}:995"
    volumes:
      - ./conf/dovecot:/opt/billionmail/conf/dovecot
      - ./logs/dovecot:/var/log/mail
      - ./ssl:/etc/ssl/mail
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - ./vmail-data:/var/vmail
      - ./rspamd-data:/var/lib/rspamd
      - ./postgresql-socket:/var/run/postgresql
    networks:
      default:
        aliases:
          - dovecot
  postfix-billionmail:
    image: billionmail/postfix:1.6
    hostname: postfix
    restart: unless-stopped
    depends_on:
      pgsql-billionmail:
        condition: service_started
    cap_add:
      - NET_BIND_SERVICE
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      DBNAME: ${DBNAME:?DBNAME is required}
      DBUSER: ${DBUSER:?DBUSER is required}
      DBPASS: ${DBPASS:?DBPASS is required}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      BILLIONMAIL_HOSTNAME: ${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /opt/billionmail/conf/postfix/conf /opt/billionmail/conf/postfix/sql
        ln -sf /opt/billionmail/conf/postfix/main.cf /etc/postfix/main.cf
        ln -sf /opt/billionmail/conf/postfix/master.cf /etc/postfix/master.cf
        ln -sf /opt/billionmail/conf/postfix/rsyslog.conf /etc/rsyslog.conf
        rm -rf /etc/postfix/conf /etc/postfix/sql
        ln -s /opt/billionmail/conf/postfix/conf /etc/postfix/conf
        ln -s /opt/billionmail/conf/postfix/sql /etc/postfix/sql
        exec "$$@"
      - --
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${SMTPS_PORT:-465}:465"
      - "${SUBMISSION_PORT:-587}:587"
    volumes:
      - ./conf/postfix:/opt/billionmail/conf/postfix
      - ./logs/postfix:/var/log/mail
      - ./ssl:/etc/ssl/mail
      - ./postfix-data:/var/spool/postfix
      - ./rspamd-data:/var/lib/rspamd
      - ./postgresql-socket:/var/run/postgresql
    networks:
      default:
        aliases:
          - postfix
  webmail-billionmail:
    image: roundcube/roundcubemail:1.6.11-fpm-alpine
    hostname: roundcube
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - dovecot-billionmail
      - postfix-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      ROUNDCUBEMAIL_DB_TYPE: pgsql
      ROUNDCUBEMAIL_DB_HOST: pgsql
      ROUNDCUBEMAIL_DB_NAME: ${DBNAME:?DBNAME is required}
      ROUNDCUBEMAIL_DB_USER: ${DBUSER:?DBUSER is required}
      ROUNDCUBEMAIL_DB_PASSWORD: ${DBPASS:?DBPASS is required}
      ROUNDCUBEMAIL_DEFAULT_HOST: dovecot
      ROUNDCUBEMAIL_DEFAULT_PORT: ${IMAP_PORT:-143}
      ROUNDCUBEMAIL_SMTP_SERVER: postfix
      ROUNDCUBEMAIL_SMTP_PORT: ${SMTP_PORT:-25}
      ROUNDCUBEMAIL_REQUEST_PATH: /roundcube
    volumes:
      - ./webmail-data:/var/www/html
      - ./conf/webmail:/var/roundcube/config
      - ./conf/php:/usr/local/etc
      - ./php-sock:/var/run
    networks:
      default:
        aliases:
          - webmail
  core-billionmail:
    image: billionmail/core:4.9.1
    hostname: core-manage
    restart: unless-stopped
    depends_on:
      - pgsql-billionmail
      - redis-billionmail
    environment:
      TZ: ${TZ:-America/Santo_Domingo}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      SafePath: ${SafePath:?SafePath is required}
      BILLIONMAIL_HOSTNAME: ${BILLIONMAIL_HOSTNAME:?BILLIONMAIL_HOSTNAME is required}
      DBNAME: ${DBNAME:?DBNAME is required}
      DBUSER: ${DBUSER:?DBUSER is required}
      DBPASS: ${DBPASS:?DBPASS is required}
      REDISPASS: ${REDISPASS:?REDISPASS is required}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTPS_PORT: ${SMTPS_PORT:-465}
      SUBMISSION_PORT: ${SUBMISSION_PORT:-587}
      IMAP_PORT: ${IMAP_PORT:-143}
      IMAPS_PORT: ${IMAPS_PORT:-993}
      POP_PORT: ${POP_PORT:-110}
      POPS_PORT: ${POPS_PORT:-995}
      HTTP_PORT: ${HTTP_PORT:-80}
      HTTPS_PORT: ${HTTPS_PORT:-443}
      IPV4_NETWORK: ${IPV4_NETWORK:-172.66.1}
      FAIL2BAN_INIT: ${FAIL2BAN_INIT:-y}
      IP_WHITELIST_ENABLE: ${IP_WHITELIST_ENABLE:-false}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
    entrypoint:
      - /bin/bash
      - -c
      - |
        mkdir -p /opt/billionmail/env
        cat > /opt/billionmail/env/.env <<EOF
        ADMIN_USERNAME=$${ADMIN_USERNAME}
        ADMIN_PASSWORD=$${ADMIN_PASSWORD}
        SafePath=$${SafePath}
        BILLIONMAIL_HOSTNAME=$${BILLIONMAIL_HOSTNAME}
        DBNAME=$${DBNAME}
        DBUSER=$${DBUSER}
        DBPASS=$${DBPASS}
        REDISPASS=$${REDISPASS}
        SMTP_PORT=$${SMTP_PORT}
        SMTPS_PORT=$${SMTPS_PORT}
        SUBMISSION_PORT=$${SUBMISSION_PORT}
        IMAP_PORT=$${IMAP_PORT}
        IMAPS_PORT=$${IMAPS_PORT}
        POP_PORT=$${POP_PORT}
        POPS_PORT=$${POPS_PORT}
        REDIS_PORT=127.0.0.1:26379
        SQL_PORT=127.0.0.1:25432
        HTTP_PORT=$${HTTP_PORT}
        HTTPS_PORT=$${HTTPS_PORT}
        TZ=$${TZ}
        IPV4_NETWORK=$${IPV4_NETWORK}
        FAIL2BAN_INIT=$${FAIL2BAN_INIT}
        IP_WHITELIST_ENABLE=$${IP_WHITELIST_ENABLE}
        RETENTION_DAYS=$${RETENTION_DAYS}
        EOF
        rm -rf /opt/billionmail/.env
        ln -s /opt/billionmail/env/.env /opt/billionmail/.env
        exec /core.sh "$$@"
      - --
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/supervisord.conf"]
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
      - NET_RAW
    expose:
      - "80"
      - "443"
    volumes:
      - ./core-env:/opt/billionmail/env
      - ./ssl:/etc/ssl/mail
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - ./conf/core/fail2ban/filter.d:/etc/fail2ban/filter.d
      - ./conf/core/fail2ban/jail.d:/etc/fail2ban/jail.d
      - ./logs/fail2ban:/var/log/fail2ban
      - ./postgresql-socket:/opt/billionmail/postgresql-socket
      - ./php-sock:/opt/billionmail/php-sock
      - ./rspamd-data:/opt/billionmail/rspamd-data
      - ./webmail-data:/opt/billionmail/webmail-data
      - ./conf:/opt/billionmail/conf
      - ./logs:/opt/billionmail/logs
      - ./logs/core:/opt/billionmail/core/logs
      - ./core-data:/opt/billionmail/core/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vmail-data:/opt/billionmail/vmail-data
    networks:
      default:
        aliases:
          - core