name: billionmail
services:
  pgsql-billionmail:
    image: postgres:17.4-alpine
    hostname: pgsql
    volumes:
      - ./postgresql-data:/var/lib/postgresql/data
      - ./postgresql-socket:/var/run/postgresql
    environment:
      - TZ=${TZ}
      - POSTGRES_DB=${DBNAME}
      - POSTGRES_USER=${DBUSER}
      - POSTGRES_PASSWORD=${DBPASS}
    restart: always
    ports:
      - "${SQL_PORT:-127.0.0.1:25432}:5432"
    networks:
      billionmail-network:
        aliases:
          - pgsql
  redis-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: redis
    hostname: redis
    entrypoint: ["/bin/sh", "/redis-conf.sh"]
    volumes:
      - ./redis-data:/data
    restart: always
    ports:
      - "${REDIS_PORT:-127.0.0.1:26379}:6379"
    environment:
      - TZ=${TZ}
      - REDISPASS=${REDISPASS}
    sysctls:
      - net.core.somaxconn=4096
    networks:
      billionmail-network:
        aliases:
          - redis
  rspamd-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: rspamd
    hostname: rspamd
    depends_on:
      - redis-billionmail
    environment:
      - TZ=${TZ}
      - REDISPASS=${REDISPASS}
      - RETENTION_DAYS=${RETENTION_DAYS:-3}
    volumes:
      - ./rspamd-data:/var/lib/rspamd
      - ./logs/rspamd:/var/log/rspamd
    restart: always
    networks:
      billionmail-network:
        aliases:
          - rspamd
  dovecot-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: dovecot
    hostname: dovecot
    depends_on:
      - pgsql-billionmail
      - redis-billionmail
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - ./logs/dovecot:/var/log/mail
      - ./ssl:/etc/ssl/mail
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - ./vmail-data:/var/vmail
      - ./rspamd-data:/var/lib/rspamd
      - ./postgresql-socket:/var/run/postgresql
    environment:
      - DBNAME=${DBNAME}
      - DBUSER=${DBUSER}
      - DBPASS=${DBPASS}
      - TZ=${TZ}
      - BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME}
      - REDISPASS=${REDISPASS}
      - RETENTION_DAYS=${RETENTION_DAYS:-3}
    ports:
      - "${IMAP_PORT:-143}:143"
      - "${IMAPS_PORT:-993}:993"
      - "${POP_PORT:-110}:110"
      - "${POPS_PORT:-995}:995"
    restart: always
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
    networks:
      billionmail-network:
        aliases:
          - dovecot
  postfix-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: postfix
    hostname: postfix
    depends_on:
      pgsql-billionmail:
        condition: service_started
    volumes:
      - ./logs/postfix:/var/log/mail
      - ./ssl:/etc/ssl/mail
      - ./postfix-data:/var/spool/postfix
      - ./rspamd-data:/var/lib/rspamd
      - ./postgresql-socket:/var/run/postgresql
    environment:
      - TZ=${TZ}
      - DBNAME=${DBNAME}
      - DBUSER=${DBUSER}
      - DBPASS=${DBPASS}
      - REDISPASS=${REDISPASS}
      - BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME}
      - RETENTION_DAYS=${RETENTION_DAYS:-3}
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "${SMTP_PORT:-25}:25"
      - "${SMTPS_PORT:-465}:465"
      - "${SUBMISSION_PORT:-587}:587"
    restart: always
    networks:
      billionmail-network:
        aliases:
          - postfix
  webmail-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: webmail
    hostname: roundcube
    depends_on:
      - pgsql-billionmail
      - dovecot-billionmail
      - postfix-billionmail
    volumes:
      - ./webmail-data:/var/www/html
      - ./php-sock/:/var/run/
    environment:
      - TZ=${TZ}
      - ROUNDCUBEMAIL_DB_TYPE=pgsql
      - ROUNDCUBEMAIL_DB_HOST=pgsql
      - ROUNDCUBEMAIL_DB_NAME=${DBNAME}
      - ROUNDCUBEMAIL_DB_USER=${DBUSER}
      - ROUNDCUBEMAIL_DB_PASSWORD=${DBPASS}
      - ROUNDCUBEMAIL_DEFAULT_HOST=dovecot
      - ROUNDCUBEMAIL_DEFAULT_PORT=${IMAP_PORT:-143}
      - ROUNDCUBEMAIL_SMTP_SERVER=postfix
      - ROUNDCUBEMAIL_SMTP_PORT=${SMTP_PORT:-25}
      - ROUNDCUBEMAIL_REQUEST_PATH=/roundcube
    restart: always
    networks:
      billionmail-network:
        aliases:
          - webmail
  core-billionmail:
    build:
      context: .
      dockerfile: Dockerfile
      target: core
    hostname: core-manage
    depends_on:
      - pgsql-billionmail
    volumes:
      - ./ssl:/etc/ssl/mail
      - ./ssl-self-signed:/etc/ssl/ssl-self-signed
      - ./logs/fail2ban:/var/log/fail2ban
      - ./postgresql-socket:/opt/billionmail/postgresql-socket
      - ./php-sock:/opt/billionmail/php-sock
      - ./rspamd-data:/opt/billionmail/rspamd-data
      - ./webmail-data:/opt/billionmail/webmail-data
      - ./logs:/opt/billionmail/logs
      - ./logs/core:/opt/billionmail/core/logs
      - ./core-data:/opt/billionmail/core/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vmail-data:/opt/billionmail/vmail-data
    configs:
      - source: billionmail_env
        target: /opt/billionmail/.env
    environment:
      - TZ=${TZ}
      - FAIL2BAN_INIT=${FAIL2BAN_INIT:-n}
    cap_add:
      - NET_BIND_SERVICE
      - NET_ADMIN
      - NET_RAW
    restart: always
    networks:
      billionmail-network:
        aliases:
          - core
networks:
  billionmail-network:
    driver: bridge
configs:
  billionmail_env:
    content: |
      ADMIN_USERNAME=${ADMIN_USERNAME}
      ADMIN_PASSWORD=${ADMIN_PASSWORD}
      SafePath=${SafePath}
      BILLIONMAIL_HOSTNAME=${BILLIONMAIL_HOSTNAME}
      DBNAME=${DBNAME}
      DBUSER=${DBUSER}
      DBPASS=${DBPASS}
      REDISPASS=${REDISPASS}
      SMTP_PORT=${SMTP_PORT:-25}
      SMTPS_PORT=${SMTPS_PORT:-465}
      SUBMISSION_PORT=${SUBMISSION_PORT:-587}
      IMAP_PORT=${IMAP_PORT:-143}
      IMAPS_PORT=${IMAPS_PORT:-993}
      POP_PORT=${POP_PORT:-110}
      POPS_PORT=${POPS_PORT:-995}
      REDIS_PORT=${REDIS_PORT:-127.0.0.1:26379}
      SQL_PORT=${SQL_PORT:-127.0.0.1:25432}
      HTTP_PORT=${HTTP_PORT:-8081}
      HTTPS_PORT=${HTTPS_PORT:-8444}
      TZ=${TZ}
      FAIL2BAN_INIT=${FAIL2BAN_INIT:-n}
      IP_WHITELIST_ENABLE=false
      RETENTION_DAYS=${RETENTION_DAYS:-3}